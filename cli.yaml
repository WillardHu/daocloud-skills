cli:
  name: dce
  short: "Command-line tool for DaoCloud Enterprise (DCE)"

auth:
  validate:
    method: GET
    path: /apis/ghippo.io/v1alpha1/current-user
    display:
      username_field: username
      fallback_field: email

# Hand-authored Skill content appended onto the generated skill files
# (e.g. the Module availability guidance in internal/skill-include/SKILL.md).
skill:
  include: internal/skill-include
