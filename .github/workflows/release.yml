name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.25'
  BIN_NAME: dce

jobs:
  build-binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        id: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT: ${{ github.sha }}
        run: |
          PKG_NAME="${BIN_NAME}-${VERSION}-${GOOS}-${GOARCH}"
          ARCHIVE="${PKG_NAME}.tar.gz"
          mkdir -p "dist/${PKG_NAME}"
          make build BIN_OUT="dist/${PKG_NAME}/${BIN_NAME}" VERSION="${VERSION}" COMMIT="${COMMIT}"
          cp -R skills "dist/${PKG_NAME}/skills"
          tar -czf "${ARCHIVE}" -C dist "${PKG_NAME}"
          echo "output=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.version }}
          ASSET: ${{ steps.build.outputs.output }}
        run: gh release upload "$TAG" "$ASSET" --clobber --repo "$GITHUB_REPOSITORY"

      - name: Upload artifact for checksum
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ steps.build.outputs.output }}
          retention-days: 1
          if-no-files-found: error

  checksum:
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-*
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: |
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.version }}
        run: gh release upload "$TAG" artifacts/checksums.txt --clobber --repo "$GITHUB_REPOSITORY"

      - name: Share checksums with downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: artifacts/checksums.txt
          retention-days: 1
          if-no-files-found: error

  publish-npm:
    needs: checksum
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Get version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download checksums.txt artifact
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: npm

      - name: Set package version
        working-directory: npm
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ github.event.release.prerelease && 'next' || 'latest' }}
        run: npm publish --access public --tag "$NPM_TAG"

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/dce"
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          TAGS="${IMAGE}:${VERSION}"
          if [ "${{ github.event.release.prerelease }}" != "true" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
          fi
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
